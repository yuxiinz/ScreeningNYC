<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Anthology Film Archives fallback poster</title>
  <desc id="desc">Fallback poster used when Anthology Film Archives does not provide artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3eadb" />
      <stop offset="100%" stop-color="#d7c1a0" />
    </linearGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)" />
  <rect x="48" y="48" width="704" height="1104" fill="none" stroke="#111111" stroke-width="8" />
  <rect x="92" y="92" width="616" height="196" fill="#111111" />
  <text x="400" y="168" fill="#f3eadb" font-size="58" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" letter-spacing="4">
    ANTHOLOGY
  </text>
  <text x="400" y="232" fill="#f3eadb" font-size="34" font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="7">
    FILM ARCHIVES
  </text>
  <rect x="92" y="350" width="616" height="28" fill="#9e3028" />
  <text x="400" y="512" fill="#111111" font-size="74" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" letter-spacing="6">
    SCREENING
  </text>
  <text x="400" y="602" fill="#111111" font-size="74" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" letter-spacing="6">
    PLACEHOLDER
  </text>
  <text x="400" y="716" fill="#111111" font-size="24" font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="5">
    USED WHEN NO POSTER IS AVAILABLE
  </text>
  <circle cx="400" cy="870" r="118" fill="none" stroke="#111111" stroke-width="10" />
  <circle cx="400" cy="870" r="18" fill="#111111" />
  <path d="M400 762 L400 978 M292 870 L508 870" stroke="#111111" stroke-width="10" />
  <text x="400" y="1086" fill="#111111" font-size="26" font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="4">
    32 SECOND AVENUE, NEW YORK
  </text>
</svg>
