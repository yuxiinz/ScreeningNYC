# .github/workflows/daily_ingest.yml  

name: Daily Ingest

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run theater ingest
        run: npm run ingest:theater
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          NODE_ENV: production

      - name: Revalidate public cache
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REVALIDATE_BASE_URL: ${{ secrets.REMINDER_BASE_URL }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${REVALIDATE_BASE_URL:-https://www.screeningnyc.com}/api/cache/revalidate" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"tags":["home-public","date-public","movie-detail-public"]}'
